services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-foreignreader}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}"
      POSTGRES_DB: "${POSTGRES_DB:-foreignreader}"
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-foreignreader} -d ${POSTGRES_DB:-foreignreader}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  migrate:
    image: migrate/migrate:v4.18.3
    volumes:
      - ./migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=${DATABASE_URL_COMPOSE:-postgres://${POSTGRES_USER:-foreignreader}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-foreignreader}?sslmode=disable}"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: "8080"
      APP_ENV: "${APP_ENV:-production}"
      READ_TIMEOUT: "${READ_TIMEOUT:-30s}"
      WRITE_TIMEOUT: "${WRITE_TIMEOUT:-120s}"
      IDLE_TIMEOUT: "${IDLE_TIMEOUT:-120s}"
      SHUTDOWN_TIMEOUT: "${SHUTDOWN_TIMEOUT:-10s}"
      DATABASE_URL: "${DATABASE_URL_COMPOSE:-postgres://${POSTGRES_USER:-foreignreader}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-foreignreader}?sslmode=disable}"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set}"
      # JWT access token lifetime (app + web); refresh session row lifetime (auth_sessions)
      ACCESS_TOKEN_TTL: "${ACCESS_TOKEN_TTL:-8h}"
      REFRESH_SESSION_TTL: "${REFRESH_SESSION_TTL:-4320h}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-}"
      GOOGLE_SERVER_CLIENT_ID: "${GOOGLE_SERVER_CLIENT_ID:?GOOGLE_SERVER_CLIENT_ID must be set}"
      APPLE_AUDIENCE: "${APPLE_AUDIENCE:?APPLE_AUDIENCE must be set}"
      APPLE_JWKS_CACHE_TTL: "${APPLE_JWKS_CACHE_TTL:-6h}"
      # Sign in with Apple (web): Services ID + redirect + team + .p8 key for token exchange; optional browser redirect after callback
      APPLE_WEB_CLIENT_ID: "${APPLE_WEB_CLIENT_ID:-}"
      APPLE_WEB_REDIRECT_URL: "${APPLE_WEB_REDIRECT_URL:-}"
      APPLE_TEAM_ID: "${APPLE_TEAM_ID:-}"
      APPLE_KEY_ID: "${APPLE_KEY_ID:-}"
      APPLE_PRIVATE_KEY: "${APPLE_PRIVATE_KEY:-}"
      APPLE_WEB_SUCCESS_REDIRECT_URL: "${APPLE_WEB_SUCCESS_REDIRECT_URL:-}"
      APPLE_WEB_ACCOUNT_REQUIRED_REDIRECT_URL: "${APPLE_WEB_ACCOUNT_REQUIRED_REDIRECT_URL:-}"
      APPLE_IAP_ISSUER_ID: "${APPLE_IAP_ISSUER_ID:-}"
      APPLE_IAP_KEY_ID: "${APPLE_IAP_KEY_ID:-}"
      APPLE_IAP_PRIVATE_KEY: "${APPLE_IAP_PRIVATE_KEY:-}"
      APPLE_IAP_BUNDLE_ID: "${APPLE_IAP_BUNDLE_ID:-}"
      APPLE_IAP_ENVIRONMENT: "${APPLE_IAP_ENVIRONMENT:-production}"
      APPLE_IAP_PRO_PRODUCT_ID: "${APPLE_IAP_PRO_PRODUCT_ID:-}"
      AUTH_DEV_MODE: "${AUTH_DEV_MODE:-false}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:?OPENAI_API_KEY must be set}"
      TRANSLATE_CONTEXT_MODEL: "${TRANSLATE_CONTEXT_MODEL:-gpt-5.4-mini}"
      TRANSLATE_CONTEXT_PROMPT_FILE: "/prompts/translate_context.txt"
      TRANSLATE_CONTEXT_TIMEOUT: "${TRANSLATE_CONTEXT_TIMEOUT:-15s}"
      ONBOARDING_CONTEXT_TRANSLATE_TOKEN: "${ONBOARDING_CONTEXT_TRANSLATE_TOKEN:-}"
      ONBOARDING_SESSION_TOKEN_TTL: "${ONBOARDING_SESSION_TOKEN_TTL:-15m}"
      ONBOARDING_SESSION_RATE_LIMIT_PER_IP: "${ONBOARDING_SESSION_RATE_LIMIT_PER_IP:-30}"
      ONBOARDING_TRANSLATE_RATE_LIMIT_PER_IP: "${ONBOARDING_TRANSLATE_RATE_LIMIT_PER_IP:-60}"
      ONBOARDING_TRANSLATE_RATE_LIMIT_PER_TOKEN: "${ONBOARDING_TRANSLATE_RATE_LIMIT_PER_TOKEN:-100}"
      ONBOARDING_TOKEN_CLEANUP_RETENTION: "${ONBOARDING_TOKEN_CLEANUP_RETENTION:-720h}"
      FREE_CONTEXT_TRANSLATIONS_PER_MONTH: "${FREE_CONTEXT_TRANSLATIONS_PER_MONTH:-100}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:?STRIPE_SECRET_KEY must be set}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:?STRIPE_WEBHOOK_SECRET must be set}"
      STRIPE_PRICE_ID_PRO: "${STRIPE_PRICE_ID_PRO:?STRIPE_PRICE_ID_PRO must be set}"
      STRIPE_REDIRECT_URL: "${STRIPE_REDIRECT_URL:-https://foreignreader.io/cabinet}"
      ANALYTICS_ENABLED: "${ANALYTICS_ENABLED:-true}"
      ANALYTICS_INGESTION_KEY: "${ANALYTICS_INGESTION_KEY:-}"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
    # Internal only — the droplet's shared gateway-nginx (outside this repo) owns 80/443
    # and Cloudflare Origin TLS, and reverse-proxies here in plain HTTP. See nginx/default.conf.
    ports:
      - "127.0.0.1:${NGINX_PORT:-9001}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  postgres_data:

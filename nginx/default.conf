# TLS terminates at the droplet's shared gateway-nginx now (outside this repo, not
# git-tracked — it owns 80/443 and holds the Cloudflare Origin certs for every project on
# the droplet). This nginx only ever receives already-decrypted plain HTTP from the gateway
# over the docker host network, so no ssl_certificate/redirect block lives here anymore.
server {
    listen 80;
    server_name api.foreignreader.io;

    location / {
        proxy_pass http://api:8080;

        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
